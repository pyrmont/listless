name: Listless

options:
  bundleIdPrefix: net.inqk.listless
  deploymentTarget:
    iOS: "18.0"
    macOS: "14.0"

configFiles:
  Debug: Generated/BuildNumber.xcconfig
  Release: Generated/BuildNumber.xcconfig

settings:
  SWIFT_VERSION: 6
  DEAD_CODE_STRIPPING: YES
  ENABLE_USER_SCRIPT_SANDBOXING: YES
  ASSETCATALOG_COMPILER_GENERATE_ASSET_SYMBOL_EXTENSIONS: YES
  ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: YES
  SWIFT_EMIT_LOC_STRINGS: YES
  STRING_CATALOG_GENERATE_SYMBOLS: YES
  DEVELOPMENT_TEAM: 7TD7PZBNXP

targets:
  Listless iOS:
    type: application
    platform: iOS
    sources:
      - Listless
      - ListlessiOS
      - Media.xcassets
    entitlements:
      path: ListlessiOS/Listless.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.developer.icloud-container-identifiers:
          - iCloud.net.inqk.listless
        com.apple.developer.icloud-services:
          - CloudKit
        com.apple.developer.ubiquity-container-identifiers:
          - iCloud.net.inqk.listless
        com.apple.developer.ubiquity-kvstore-identifier: $(TeamIdentifierPrefix)$(CFBundleIdentifier)
        aps-environment: development
    info:
      path: ListlessiOS/Info.plist
      properties:
        CFBundleDisplayName: Listless
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        ITSAppUsesNonExemptEncryption: false
        LSRequiresIPhoneOS: true
        UILaunchScreen: {}
        UIBackgroundModes:
          - remote-notification
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: net.inqk.listless
      INFOPLIST_FILE: ListlessiOS/Info.plist
      TARGETED_DEVICE_FAMILY: "1,2"
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      CODE_SIGN_STYLE: Automatic

  Listless macOS:
    type: application
    platform: macOS
    sources:
      - Listless
      - path: ListlessMac
        excludes:
          - "AppKit/**"
      - path: ListlessMac/Credits.html
        type: file
        buildPhase: resources
      - Media.xcassets
    entitlements:
      path: ListlessMac/Listless.entitlements
      properties:
        com.apple.developer.icloud-container-identifiers:
          - iCloud.net.inqk.listless
        com.apple.developer.icloud-services:
          - CloudKit
        com.apple.developer.ubiquity-container-identifiers:
          - iCloud.net.inqk.listless
        com.apple.developer.ubiquity-kvstore-identifier: $(TeamIdentifierPrefix)$(CFBundleIdentifier)
        aps-environment: development
    info:
      path: ListlessMac/Info.plist
      properties:
        CFBundleDisplayName: Listless
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        ITSAppUsesNonExemptEncryption: false
        LSApplicationCategoryType: public.app-category.productivity
        LSMinimumSystemVersion: "14.0"
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: net.inqk.listless
      PRODUCT_NAME: Listless
      INFOPLIST_FILE: ListlessMac/Info.plist
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      CODE_SIGN_STYLE: Automatic

  Listless iOS Unit Tests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - Tests/Unit
      - Tests/Support
    dependencies:
      - target: Listless iOS
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: net.inqk.listless.ios.unittests
      CODE_SIGN_STYLE: Automatic
      TEST_HOST: $(BUILT_PRODUCTS_DIR)/Listless iOS.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/Listless iOS
      BUNDLE_LOADER: $(TEST_HOST)
      GENERATE_INFOPLIST_FILE: YES

schemes:
  Listless iOS:
    build:
      targets:
        Listless iOS: all
      preActions:
        - script: |
            cd "${SRCROOT}"
            buildYear=`git log -1 --format=%cd --date=format:%Y`
            buildVersion=`git rev-list HEAD | wc -l | tr -d ' '`
            echo "CURRENT_PROJECT_VERSION = $buildYear.$buildVersion" > Generated/BuildNumber.xcconfig
          settingsTarget: Listless iOS
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - name: Listless iOS Unit Tests
          parallelizable: true
          randomExecutionOrder: true
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

  Listless macOS:
    build:
      targets:
        Listless macOS: all
      preActions:
        - script: |
            cd "${SRCROOT}"
            buildYear=`git log -1 --format=%cd --date=format:%Y`
            buildVersion=`git rev-list HEAD | wc -l | tr -d ' '`
            echo "CURRENT_PROJECT_VERSION = $buildYear.$buildVersion" > Generated/BuildNumber.xcconfig
          settingsTarget: Listless macOS
    run:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
